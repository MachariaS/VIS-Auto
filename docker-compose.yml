version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vis_user
      POSTGRES_PASSWORD: vis_password
      POSTGRES_DB: vis_assist
    ports:
      - "5432:5432"
    volumes:
      - vis_postgres_data:/var/lib/postgresql/data

volumes:
  vis_postgres_data: